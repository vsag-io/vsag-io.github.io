<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="430" viewBox="0 0 1080 430">
  <defs>
    <style>
      .title { font: 700 24px Arial, "Microsoft YaHei", sans-serif; fill: #172033; }
      .section { font: 700 18px Arial, "Microsoft YaHei", sans-serif; fill: #172033; }
      .label { font: 700 13px Arial, "Microsoft YaHei", sans-serif; fill: #334155; }
      .loop-label { font: 700 16px Arial, "Microsoft YaHei", sans-serif; fill: #334155; }
      .loop-note { font: 14px Arial, "Microsoft YaHei", sans-serif; fill: #64748b; }
      .text { font: 13px Arial, "Microsoft YaHei", sans-serif; fill: #475569; }
      .small { font: 12px Arial, "Microsoft YaHei", sans-serif; fill: #64748b; }
      .mono { font: 12px Consolas, "SFMono-Regular", monospace; fill: #1f2937; }
      .outer { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.4; stroke-dasharray: 7 6; rx: 18; }
      .stage { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; rx: 10; }
      .window { fill: #eef6ff; stroke: #87bdf8; stroke-width: 1.3; rx: 8; }
      .term { fill: #eef2ff; stroke: #818cf8; stroke-width: 1.1; }
      .id { fill: #dbeafe; stroke: #60a5fa; stroke-width: 1.1; }
      .value { fill: #fef3c7; stroke: #f59e0b; stroke-width: 1.1; }
      .query { fill: #e0f2fe; stroke: #38bdf8; stroke-width: 1.1; }
      .product { fill: #ecfdf5; stroke: #34d399; stroke-width: 1.1; }
      .score { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.1; rx: 5; }
      .score-empty { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.1; rx: 5; }
      .heap-hit { fill: #eef2ff; stroke: #818cf8; stroke-width: 1.2; rx: 5; }
      .heap-node { fill: #ffffff; stroke: #818cf8; stroke-width: 1.4; }
      .muted { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.1; }
      .arrow { stroke: #64748b; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .loop { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow-loop); }
      .dash { stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 5 5; fill: none; marker-end: url(#arrow-sm); }
      .line { stroke: #64748b; stroke-width: 1.6; fill: none; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7"
            orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-loop" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5"
            orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-sm" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6"
            orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
