      <rect x="56" y="32" width="27" height="22" class="value"/>
      <text x="69" y="47" text-anchor="middle" class="mono">0.7</text>
      <rect x="83" y="32" width="20" height="22" class="id"/>
      <text x="93" y="47" text-anchor="middle" class="mono">D3</text>
      <rect x="103" y="32" width="27" height="22" class="value"/>
      <text x="116" y="47" text-anchor="middle" class="mono">0.4</text>
