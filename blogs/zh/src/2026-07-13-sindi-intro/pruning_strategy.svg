<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="836" viewBox="0 0 1400 836">
  <defs>
    <style>
      .title { font: 700 30px Arial, "Microsoft YaHei", sans-serif; fill: #111827; }
      .section { font: 700 25px Arial, "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .subtitle { font: 700 21px Arial, "Microsoft YaHei", sans-serif; fill: #374151; }
      .small { font: 19px Arial, "Microsoft YaHei", sans-serif; fill: #6b7280; }
      .mono { font: 17px Consolas, "Liberation Mono", monospace; fill: #1f2937; }
      .band-build { fill: #f8fafc; stroke: #d1d5db; stroke-width: 1.5; rx: 12; }
      .band-search { fill: #fbfbf8; stroke: #d1d5db; stroke-width: 1.5; rx: 12; }
      .layer-vector { fill: #ecfdf5; stroke: #22c55e; stroke-width: 1.6; rx: 12; }
      .layer-index { fill: #eff6ff; stroke: #3b82f6; stroke-width: 1.6; rx: 12; }
      .panel { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.4; rx: 9; }
      .keep { fill: #bbf7d0; stroke: #16a34a; stroke-width: 1.4; rx: 7; }
      .drop { fill: #f3f4f6; stroke: #cbd5e1; stroke-width: 1.4; rx: 7; }
      .scan { fill: #bfdbfe; stroke: #2563eb; stroke-width: 1.4; rx: 7; }
      .skip { fill: #fee2e2; stroke: #f87171; stroke-width: 1.4; rx: 7; }
      .muted { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.3; rx: 7; }
      .arrow { stroke: #64748b; stroke-width: 3.2; fill: none; marker-end: url(#arrow); }
      .cut { stroke: #ef4444; stroke-width: 2.3; stroke-dasharray: 6 5; fill: none; }
      .quality { stroke: #16a34a; stroke-width: 4.2; fill: none; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9"
            orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1400" height="836" fill="#ffffff"/>

  <rect x="66" y="88" width="1268" height="350" class="band-build"/>
  <text x="760" y="123" text-anchor="middle" class="section">构建期</text>

  <rect x="107" y="142" width="576" height="270" class="layer-vector"/>
  <text x="395" y="164" text-anchor="middle" class="subtitle">向量层面：文档侧剪枝</text>
  <text x="395" y="198" text-anchor="middle" class="small">
    doc_prune_ratio = 0.2，保留 80% 总质量
  </text>

  <rect x="124" y="214" width="542" height="174" class="panel"/>
  <text x="148" y="242" class="subtitle">文档 D3 的稀疏向量</text>
  <g transform="translate(148,262)">
    <rect width="86" height="38" class="keep"/>
    <text x="43" y="25" text-anchor="middle" class="mono">t7 0.42</text>
    <rect x="98" width="86" height="38" class="keep"/>
    <text x="141" y="25" text-anchor="middle" class="mono">t2 0.28</text>
    <rect x="196" width="86" height="38" class="keep"/>
    <text x="239" y="25" text-anchor="middle" class="mono">t9 0.18</text>
    <rect x="294" width="86" height="38" class="drop"/>
    <text x="337" y="25" text-anchor="middle" class="mono">t5 0.08</text>
    <rect x="392" width="86" height="38" class="drop"/>
    <text x="435" y="25" text-anchor="middle" class="mono">t1 0.04</text>
  </g>
  <path d="M 156 304 C 235 322, 343 322, 436 304" class="quality"/>
  <text x="148" y="342" class="small">
    总质量 = 1.00
  </text>
  <text x="148" y="365" class="small">
    保留质量：0.42 -> 0.70 -> 0.88；低贡献项不写入索引
  </text>

  <path d="M 710 276 L 810 276" class="arrow"/>
  <text x="760" y="252" text-anchor="middle" class="small">只写入保留项</text>

  <rect x="837" y="142" width="466" height="270" class="layer-index"/>
  <text x="1070" y="190" text-anchor="middle" class="small">倒排索引中能看到 D3 的位置</text>
  <g transform="translate(850,216)">
    <text x="0" y="26" class="mono">t7</text>
    <rect x="42" width="70" height="38" class="scan"/>
    <text x="77" y="25" text-anchor="middle" class="mono">D2</text>
    <rect x="124" width="70" height="38" class="scan"/>
    <text x="159" y="25" text-anchor="middle" class="mono">D3</text>
    <rect x="206" width="70" height="38" class="scan"/>
    <text x="241" y="25" text-anchor="middle" class="mono">D9</text>
  </g>
  <g transform="translate(850,266)">
    <text x="0" y="26" class="mono">t2</text>
    <rect x="42" width="70" height="38" class="scan"/>
    <text x="77" y="25" text-anchor="middle" class="mono">D3</text>
    <rect x="124" width="70" height="38" class="scan"/>
    <text x="159" y="25" text-anchor="middle" class="mono">D8</text>
    <rect x="206" width="70" height="38" class="scan"/>
    <text x="241" y="25" text-anchor="middle" class="mono">D1</text>
  </g>
  <g transform="translate(1164,216)">
    <text x="0" y="26" class="mono">t5</text>
    <rect x="44" width="82" height="38" class="muted"/>
    <text x="85" y="25" text-anchor="middle" class="small">无 D3</text>
  </g>
  <g transform="translate(1164,266)">
    <text x="0" y="26" class="mono">t1</text>
    <rect x="44" width="82" height="38" class="muted"/>
    <text x="85" y="25" text-anchor="middle" class="small">无 D3</text>
  </g>
  <text x="1070" y="362" text-anchor="middle" class="small">结果：D3 只进入 t7、t2、t9 等保留词项的倒排列表</text>

  <rect x="66" y="464" width="1268" height="320" class="band-search"/>
  <text x="760" y="498" text-anchor="middle" class="section">搜索期</text>

  <rect x="107" y="518" width="576" height="240" class="layer-vector"/>
  <text x="395" y="540" text-anchor="middle" class="subtitle">向量层面：查询侧剪枝</text>
  <text x="395" y="574" text-anchor="middle" class="small">
    query_prune_ratio = 0.25，保留 75% 查询词项
  </text>

  <rect x="124" y="590" width="542" height="144" class="panel"/>
  <text x="148" y="618" class="subtitle">查询向量</text>
  <g transform="translate(148,638)">
    <rect width="92" height="38" class="keep"/>
    <text x="46" y="25" text-anchor="middle" class="mono">t2 0.50</text>
    <rect x="104" width="92" height="38" class="keep"/>
    <text x="150" y="25" text-anchor="middle" class="mono">t7 0.31</text>
    <rect x="208" width="92" height="38" class="keep"/>
    <text x="254" y="25" text-anchor="middle" class="mono">t4 0.12</text>
    <rect x="312" width="92" height="38" class="drop"/>
    <text x="358" y="25" text-anchor="middle" class="mono">t9 0.07</text>
  </g>
  <path d="M 458 632 L 458 684" class="cut"/>
  <text x="148" y="708" class="small">4 个查询词项 -> 保留 3 个，t9 不访问</text>

  <path d="M 710 652 L 810 652" class="arrow"/>
  <text x="760" y="628" text-anchor="middle" class="small">访问保留词项</text>

  <rect x="837" y="518" width="466" height="240" class="layer-index"/>
  <text x="1070" y="540" text-anchor="middle" class="subtitle">索引层面：倒排列表侧剪枝</text>
  <text x="1070" y="574" text-anchor="middle" class="small">
    term_prune_ratio = 0.3，扫描 70% posting
  </text>
  <rect x="866" y="588" width="404" height="132" class="panel"/>
  <g transform="translate(892,606)">
    <text x="0" y="26" class="mono">t2</text>
    <rect x="44" width="64" height="38" class="scan"/>
    <text x="76" y="25" text-anchor="middle" class="mono">D3</text>
    <rect x="120" width="64" height="38" class="scan"/>
    <text x="152" y="25" text-anchor="middle" class="mono">D8</text>
    <rect x="196" width="64" height="38" class="scan"/>
    <text x="228" y="25" text-anchor="middle" class="mono">D1</text>
    <rect x="272" width="64" height="38" class="skip"/>
    <text x="304" y="25" text-anchor="middle" class="mono">D6</text>
  </g>
  <g transform="translate(892,654)">
    <text x="0" y="26" class="mono">t7</text>
    <rect x="44" width="64" height="38" class="scan"/>
    <text x="76" y="25" text-anchor="middle" class="mono">D2</text>
    <rect x="120" width="64" height="38" class="scan"/>
    <text x="152" y="25" text-anchor="middle" class="mono">D3</text>
    <rect x="196" width="64" height="38" class="scan"/>
    <text x="228" y="25" text-anchor="middle" class="mono">D9</text>
    <rect x="272" width="64" height="38" class="skip"/>
    <text x="304" y="25" text-anchor="middle" class="mono">D5</text>
  </g>
  <path d="M 1164 600 L 1164 700" class="cut"/>
  <text x="1070" y="742" text-anchor="middle" class="small">每条列表扫描前 70%，跳过后 30%</text>

  <g transform="translate(130,800)">
    <rect width="22" height="18" class="keep"/>
    <text x="32" y="16" class="small">保留的向量词项</text>
    <rect x="190" width="22" height="18" class="drop"/>
    <text x="222" y="16" class="small">向量层面丢弃</text>
    <rect x="390" width="22" height="18" class="scan"/>
    <text x="422" y="16" class="small">实际扫描的 posting</text>
    <rect x="620" width="22" height="18" class="skip"/>
    <text x="652" y="16" class="small">索引层面跳过</text>
  </g>
</svg>
